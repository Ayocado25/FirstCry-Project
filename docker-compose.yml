version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: daycare_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       daycare_tracker
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-daycare_secret_2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations/001_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - daycare_net

  # ── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: daycare_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:              production
      PORT:                  5000
      DB_HOST:               db
      DB_PORT:               5432
      DB_NAME:               daycare_tracker
      DB_USER:               postgres
      DB_PASSWORD:           ${DB_PASSWORD:-daycare_secret_2026}
      JWT_ACCESS_SECRET:     ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET:    ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES:    15m
      JWT_REFRESH_EXPIRES:   7d
      FRONTEND_URL:          ${FRONTEND_URL:-http://localhost:3000}
      SMTP_HOST:             ${SMTP_HOST:-}
      SMTP_PORT:             ${SMTP_PORT:-587}
      SMTP_USER:             ${SMTP_USER:-}
      SMTP_PASS:             ${SMTP_PASS:-}
      EMAIL_FROM:            ${EMAIL_FROM:-noreply@intellitots.com}
      TWILIO_ACCOUNT_SID:    ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN:     ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_FROM:  ${TWILIO_WHATSAPP_FROM:-}
      RATE_LIMIT_WINDOW_MS:  900000
      RATE_LIMIT_MAX:        100
      LOG_LEVEL:             info
    ports:
      - "5000:5000"
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - daycare_net

  # ── Frontend (served by Nginx) ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_APP_NAME: "Daycare Routine Tracker"
    container_name: daycare_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - daycare_net

volumes:
  postgres_data:

networks:
  daycare_net:
    driver: bridge
